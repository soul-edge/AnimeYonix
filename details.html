<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Details | AnimeYonix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Anime<span>Yonix</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
    </nav>

    <div class="details-container">
        <img id="det-thumb" class="details-cover" src="" alt="Cover Art">
        <div class="details-info">
            <h1 id="det-title" class="details-title">Loading...</h1>
            <div id="det-genre" class="details-genre">GENRE: ...</div>
            <p id="det-syn" class="details-synopsis">Loading synopsis...</p>
            
            <h2 style="margin-bottom: 15px;">Episodes</h2>
            <div id="ep-list" class="episodes-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Read the title from the web address (URL)
        const params = new URLSearchParams(window.location.search);
        const title = decodeURIComponent(params.get('title'));
        
        // 2. Get the library from storage
        const library = JSON.parse(localStorage.getItem('animeLibrary')) || {};
        const anime = library[title];

        // 3. Populate the page
        if(anime) {
            document.getElementById('det-title').innerText = title;
            document.getElementById('det-genre').innerText = "GENRE: " + (anime.genre || "N/A");
            document.getElementById('det-syn').innerText = anime.synopsis || "No description available.";
            document.getElementById('det-thumb').src = anime.mainThumbnail;

            const epList = document.getElementById('ep-list');
            epList.innerHTML = ""; 
            anime.episodes.forEach(ep => {
                epList.innerHTML += `<div class="ep-btn" onclick="window.location.href='watch.html?url=${encodeURIComponent(ep.link)}&title=${encodeURIComponent(title)}&ep=${ep.number}'">Ep ${ep.number}</div>`;
            });
        } else {
            // If nothing shows up, this helps you see if the title is being found
            document.body.innerHTML = "<h1>Error: Could not find anime: " + title + "</h1>";
        }
    });
</script>

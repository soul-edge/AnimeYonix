<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaYonix - Details</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo-container"><h2>Manga<span class="accent">Yonix</span></h2></div>
            <nav class="sidebar-nav">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="#" id="nav-login" onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</a>
                <a href="#" id="nav-profile" style="display:none;" onclick="window.location.href='index.html?view=wishlist'"><i class="fas fa-bookmark"></i> Wishlist</a>
                <a href="#" id="nav-logout" style="display:none;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-container">
                    <input type="text" id="userSearch" placeholder="Search for manga..." onkeyup="if(event.key === 'Enter') searchAnimeAPI()">
                    <button onclick="searchAnimeAPI()"><i class="fas fa-search"></i></button>
                </div>
            </header>
            
            <div class="det-layout">
                <div class="det-poster">
                    <img id="det-thumb" src="" alt="Manga Cover">
                </div>
                <div class="det-info">
                    <h1 id="det-title">Loading...</h1>
                    <p id="det-genre" style="color: var(--accent); font-weight: bold; margin-bottom: 15px;"></p>
                    <p id="det-syn" style="color: var(--text-muted); line-height: 1.6;"></p>
                    <!-- Wishlist button injects here via JS -->
                </div>
            </div>

            <section class="content-section">
                <h2>Chapters</h2>
                <div id="ep-list"></div>
            </section>
        </main>
    </div>
    <script src="script.js?v=FIXLOOP"></script>
</body>
</html>

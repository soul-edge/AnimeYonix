<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watching Now - AnimeYonix</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="watch-page">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
                ANIME<span>YONIX</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Back to Home</a>
            </div>
        </div>
    </nav>

    <div class="watch-container">
        <div class="main-player">
            <div class="video-wrapper">
                <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="video-details">
                <h1 id="playingTitle">Loading Episode...</h1>
                <div class="player-actions">
                    <button><i class="fas fa-step-backward"></i> Prev</button>
                    <button><i class="fas fa-step-forward"></i> Next</button>
                    <button><i class="fas fa-expand"></i> Focus Mode</button>
                </div>
            </div>
        </div>

        <div class="ep-sidebar">
            <h3>Next Episodes</h3>
            <div id="sidebarList" class="sidebar-list">
                </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const anime = params.get('anime');
        const ep = params.get('ep');

        // Logic to update the player
        if(anime && ep) {
            document.getElementById('playingTitle').innerText = `${anime.replace('-', ' ').toUpperCase()} - Episode ${ep}`;
            
            // Example: Change the video source based on the episode
            const player = document.getElementById('videoPlayer');
            // If you have your videos on a server:
            // player.src = `https://your-server.com/videos/${anime}/ep${ep}.mp4`;
            
            // For now, let's just use a placeholder
            player.src = "https://www.youtube.com/embed/dQw4w9WgXcQ"; 
        }
    </script>
</body>
</html>

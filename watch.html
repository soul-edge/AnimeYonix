<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaYonix - Reader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="reader-body">
    
    <!-- TOP APP BAR -->
    <div class="reader-topbar" id="readerTopbar">
        <button class="r-icon-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
        <div class="r-title-group">
            <h1 id="playingTitle">Loading...</h1>
            <h2 id="playingEp">Chapter --</h2>
        </div>
        <!-- Removed the 3 dots, kept the Wishlist! -->
        <button class="r-icon-btn" id="wishlist-btn" onclick="toggleReaderWishlist()"><i class="far fa-bookmark"></i></button>
    </div>

    <!-- MANGA VIEWPORT -->
    <div id="mangaView" class="reader-viewport"></div>

    <!-- BOTTOM CONTROL BAR -->
    <div class="reader-bottombar" id="readerBottombar">
        <!-- Row 1: Navigation & Slider -->
        <div class="r-nav-row">
            <button class="r-icon-btn nav-arrow" id="btn-prev-chap" onclick="changeChapter(-1)"><i class="fas fa-step-backward"></i></button>
            
            <div class="slider-container">
                <span id="page-current">1</span>
                <input type="range" id="pageSlider" min="0" max="1" value="0" oninput="jumpToPage(this.value)">
                <span id="page-max">--</span>
            </div>

            <button class="r-icon-btn nav-arrow" id="btn-next-chap" onclick="changeChapter(1)"><i class="fas fa-step-forward"></i></button>
        </div>

        <!-- Row 2: Modes & Fullscreen -->
        <div class="r-settings-row">
            <button class="r-icon-btn active-mode" id="btn-single" onclick="setReaderMode('single')"><i class="fas fa-tablet-alt"></i></button>
            <button class="r-icon-btn" id="btn-webtoon" onclick="setReaderMode('webtoon')"><i class="fas fa-arrows-alt-v"></i></button>
            <!-- Removed the dead gear icon -->
            <button class="r-icon-btn" onclick="toggleReaderUI()"><i class="fas fa-expand"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

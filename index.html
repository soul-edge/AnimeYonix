<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeYonix | Watch Anime Free</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <header>
        <div class="nav-container">
            <h1 class="logo">Anime<span>Yonix</span></h1>
            
            <div class="search-wrapper">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search anime...">
                    <button><i class='bx bx-search'></i></button>
                </div>
                <div id="searchDropdown" class="search-dropdown"></div>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <h2>Trending Now</h2>
        </section>

        <section class="anime-grid">
            <div class="anime-card" onclick="location.href='db-episodes.html'">
                <div class="poster">
                    <img src="db.jpg" alt="Dragon Ball">
                    <div class="overlay"><i class='bx bx-play-circle'></i></div>
                </div>
                <div class="info">
                    <h3>Dragon Ball Series</h3>
                    <p>Action, Adventure</p>
                </div>
            </div>

            <div class="anime-card" onclick="location.href='solo-episodes.html'">
                <div class="poster">
                    <img src="solo.jpg" alt="Solo Leveling">
                    <div class="overlay"><i class='bx bx-play-circle'></i></div>
                </div>
                <div class="info">
                    <h3>Solo Leveling</h3>
                    <p>Fantasy, Action</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>

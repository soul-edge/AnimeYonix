<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeYonix - Home</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">ANIME<span>YONIX</span></div>
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="#">Trending</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <h2 style="color: #fff; margin-bottom: 20px;">Trending Now</h2>
        <div class="anime-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
            
            <a href="player.html?anime=solo-leveling" style="text-decoration: none;">
                <div class="anime-card" style="background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #30363d; transition: 0.3s;">
                    <img src="https://via.placeholder.com/200x300?text=Solo+Leveling" alt="Solo Leveling" style="width: 100%; border-radius: 8px; margin-bottom: 10px;">
                    <h3 style="color: #fff; font-size: 1.1rem;">Solo Leveling</h3>
                    <p style="color: #8b949e; font-size: 0.9rem;">Action • Adventure</p>
                </div>
            </a>

            <a href="player.html?anime=dragon-ball" style="text-decoration: none;">
                <div class="anime-card" style="background: #1a1d21; padding: 15px; border-radius: 12px; border: 1px solid #30363d; transition: 0.3s;">
                    <img src="https://via.placeholder.com/200x300?text=Dragon+Ball" alt="Dragon Ball" style="width: 100%; border-radius: 8px; margin-bottom: 10px;">
                    <h3 style="color: #fff; font-size: 1.1rem;">Dragon Ball</h3>
                    <p style="color: #8b949e; font-size: 0.9rem;">Classic • Shonen</p>
                </div>
            </a>

        </div>
    </div>
</body>
</html>

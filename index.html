<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<meta name="referrer" content="no-referrer" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeYonix | Stream Premium Anime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- THE LEFT SIDEBAR -->
        <aside class="sidebar">
            <div class="logo-container">
                <h2>Anime<span class="accent">Yonix</span></h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="active"><i class="fas fa-home"></i> Home</a>
                <a href="#" id="nav-login"><i class="fas fa-sign-in-alt"></i> Login</a>
                <a href="#" id="nav-profile" style="display:none;"><i class="fas fa-user"></i> Profile</a>
                <a href="#" id="nav-logout" style="display:none;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <!-- THE MAIN CONTENT -->
        <main class="main-content">
            <!-- TOP BAR (Search) -->
            <header class="topbar">
                <div class="search-container">
                    <input type="text" id="userSearch" placeholder="Search for manga..." onkeyup="if(event.key === 'Enter') searchAnimeAPI()">
                    <button onclick="searchAnimeAPI()"><i class="fas fa-search"></i></button>
                </div>
            </header>

            <!-- HERO BANNER -->
            <section class="hero">
                <div class="hero-content">
                    <h1>Read your favorite manga with high-quality scans.</h1>
                    <p>Ad-free, lightning fast, and always updated.</p>
                </div>
            </section>

            <!-- MANGA GRID -->
            <section class="content-section">
                <h2>Top Trending</h2>
                <div id="episodeGrid" class="grid-container">
                    <!-- Cards will inject here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Firebase Scripts Here (Keep your existing script tags at the bottom!) -->
    <script src="script.js?v=PRODESIGN"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeYonix | Hunter x Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">ANIME<span>YONIX</span></div>
        <button class="btn-login" id="loginBtn">KANÉKI</button>
    </header>

    <div class="anime-grid">
        <div class="anime-card" onclick="openPlayer()">
            <img src="7I7Z9TNbyNL.jpg" alt="HxH Poster">
            <p>Hunter x Hunter (2011) - Ep 01</p>
        </div>
    </div>

    <div id="videoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePlayer()">&times;</span>
            <video id="mainVideo" controls crossorigin="anonymous">
                <source src="INSERT_YOUR_VIDEO_LINK_HERE" type="video/mp4">
                
                <track label="English" kind="subtitles" srclang="en" src="hxh01.vtt" default>
            </video>
            <div class="episode-bar">
                <button class="ep-btn">Episode 1</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

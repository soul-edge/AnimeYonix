<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamYonix | Anime Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">STREAM<span>YONIX</span></div>
            
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">Series</a></li>
                <li><a href="#">Newest</a></li>
            </ul>

            <div class="nav-actions">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search anime..." onkeyup="searchAnime()">
                    <i class="fas fa-search"></i>
                </div>
                <button class="login-btn" onclick="toggleLogin()">Login</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Hunter x Hunter</h1>
            <p>Gon Freecss aspires to become a Hunter, an exceptional being capable of greatness. With his friends and his potential, he seeks out his father.</p>
            <div class="hero-btns">
                <button class="play-btn" onclick="openPlayer()"><i class="fas fa-play"></i> Watch Now</button>
                <button class="info-btn"><i class="fas fa-info-circle"></i> Info</button>
            </div>
        </div>
    </header>

  
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePlayer()">&times;</span>
            <div class="video-wrapper">
                <video id="mainVideo" controls crossorigin="anonymous">
                    <source src="" type="video/mp4">
                    <track label="English" kind="subtitles" srclang="en" src="hxh01.vtt" default>
                </video>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="submit-btn">Login</button>
            <p onclick="toggleLogin()">Cancel</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

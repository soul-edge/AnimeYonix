<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeYonix - Home</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">ANIME<span>YONIX</span></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search anime..." onkeyup="searchAnime()">
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="#">Trending</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <div class="hero-section" style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('./hero-bg.jpg'); padding: 60px; border-radius: 20px; margin-bottom: 40px;">
            <h1 style="font-size: 3rem; color: #fff;">Welcome to StreamYonix</h1>
            <p style="color: #ccc; max-width: 600px; margin: 20px 0;">Watch your favorite anime in high quality without limits. Explore our database below.</p>
        </div>

        <h2 style="margin-bottom: 20px; color: #fff;">Trending Now</h2>
        <div class="anime-grid">
            <a href="player.html?anime=solo-leveling" class="anime-card" style="text-decoration: none;">
                <img src="./solo.jpg" alt="Solo Leveling" style="width: 100%; border-radius: 12px; margin-bottom: 10px;">
                <h3 style="color: #fff; font-size: 1rem;">Solo Leveling</h3>
                <p style="color: #8b949e; font-size: 0.8rem;">2024 • TV</p>
            </a>

            <a href="player.html?anime=dragon-ball" class="anime-card" style="text-decoration: none;">
                <img src="./db.jpg" alt="Dragon Ball" style="width: 100%; border-radius: 12px; margin-bottom: 10px;">
                <h3 style="color: #fff; font-size: 1rem;">Dragon Ball</h3>
                <p style="color: #8b949e; font-size: 0.8rem;">1986 • TV</p>
            </a>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>

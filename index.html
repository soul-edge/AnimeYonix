<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaYonix - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- THE LEFT SIDEBAR (Now a slide-out overlay!) -->
        <aside class="sidebar">
            <div class="logo-container">
                <h2>Manga<span class="accent">Yonix</span></h2>
             <!-- THE NEW CLOSE BUTTON -->
<button class="close-btn" onclick="document.querySelector('.sidebar').classList.remove('mobile-active')">
    <i class="fas fa-chevron-left"></i>
</button>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="active"><i class="fas fa-home"></i> Home</a>
                <a href="#" id="nav-login" onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</a>
                <a href="#" id="nav-profile" style="display:none;"><i class="fas fa-bookmark"></i> Wishlist</a>
                <a href="#" id="nav-logout" style="display:none;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <!-- THE MAIN CONTENT -->
        <main class="main-content">
            <header class="topbar">
                <button class="menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('mobile-active')">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="search-container">
                    <input type="text" id="userSearch" placeholder="Search for manga..." onkeyup="if(event.key === 'Enter') searchAnimeAPI()">
                    <button onclick="searchAnimeAPI()"><i class="fas fa-search"></i></button>
                </div>
            </header>

            <div id="home-view">
                <section class="hero">
                    <div class="hero-content">
                        <h1>Welcome to MangaYonix.</h1>
                        <p>Read your favorite manga with high-quality scans. Ad-free, lightning fast, and always updated.</p>
                    </div>
                </section>

                <section class="content-section" id="history-section" style="display: none;">
                    <h2><i class="fas fa-history"></i> Continue Reading</h2>
                    <div class="carousel-container">
                        <button class="scroll-btn scroll-left" onclick="scrollCarousel('historyGrid', -600)"><i class="fas fa-chevron-left"></i></button>
                        <div id="historyGrid" class="carousel"></div>
                        <button class="scroll-btn scroll-right" onclick="scrollCarousel('historyGrid', 600)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </section>

                <section class="content-section">
                    <h2>Recently Updated</h2>
                    <div class="carousel-container">
                        <button class="scroll-btn scroll-left" onclick="scrollCarousel('recentGrid', -600)"><i class="fas fa-chevron-left"></i></button>
                        <div id="recentGrid" class="carousel"></div>
                        <button class="scroll-btn scroll-right" onclick="scrollCarousel('recentGrid', 600)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </section>

                <section class="content-section">
                    <h2>Top Rated Masterpieces</h2>
                    <div id="topRatedGrid" class="grid-container"></div>
                </section>
            </div>

            <div id="profile-view" style="display: none; padding: 0 40px 40px 40px;">
                <h2 style="font-size: 2rem; margin-bottom: 30px;"><i class="fas fa-bookmark"></i> My Wishlist</h2>
                <div id="wishlistGrid" class="grid-container"></div>
            </div>
        </main>
    </div>

    <!-- Main Logic Script -->
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeYonix - Home</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; padding: 20px 0; }
        .anime-card { background: #1a1d21; border-radius: 12px; overflow: hidden; border: 1px solid #30363d; transition: 0.3s all ease; cursor: pointer; text-decoration: none; display: block; }
        .anime-card:hover { transform: translateY(-10px); border-color: #00d1ff; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .anime-card img { width: 100%; height: 300px; object-fit: cover; }
        .card-details { padding: 15px; }
        .card-details h3 { color: #fff; margin: 0 0 5px 0; font-size: 1.1rem; }
        .card-details p { color: #8b949e; font-size: 0.85rem; margin: 0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">ANIME<span>YONIX</span></div>
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="#">Trending</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <h1 style="color: #fff; margin-bottom: 30px;">Trending Now</h1>
        <div class="anime-grid">
            
            <a href="player.html?anime=solo-leveling" class="anime-card">
                <img src="./solo.jpg" alt="Solo Leveling" onerror="this.src='https://via.placeholder.com/200x300?text=Solo+Leveling'">
                <div class="card-details">
                    <h3>Solo Leveling</h3>
                    <p>Action • Adventure</p>
                </div>
            </a>

            <a href="player.html?anime=dragon-ball" class="anime-card">
                <img src="./db.jpg" alt="Dragon Ball" onerror="this.src='https://via.placeholder.com/200x300?text=Dragon+Ball'">
                <div class="card-details">
                    <h3>Dragon Ball</h3>
                    <p>Classic • Shonen</p>
                </div>
            </a>

        </div>
    </div>
</body>
</html>

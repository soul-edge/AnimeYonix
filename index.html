<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeYonix - Premium Home</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Pro Layout */
        .search-container { position: relative; flex: 1; max-width: 400px; margin: 0 20px; }
        .search-container input { width: 100%; padding: 12px 45px 12px 20px; border-radius: 25px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; transition: 0.3s; }
        .search-container input:focus { border-color: #00d1ff; box-shadow: 0 0 10px rgba(0, 209, 255, 0.2); }
        .search-container i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #8b949e; }
        
        .login-btn { background: #00d1ff; color: #000; padding: 10px 25px; border-radius: 8px; font-weight: bold; text-decoration: none; transition: 0.3s; }
        .login-btn:hover { background: #fff; transform: scale(1.05); }

        /* Advanced Grid */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; margin-top: 40px; }
        .anime-card { background: #161b22; border-radius: 15px; overflow: hidden; border: 1px solid #30363d; transition: 0.4s ease; text-decoration: none; display: block; position: relative; }
        .anime-card:hover { transform: translateY(-10px); border-color: #00d1ff; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .anime-card img { width: 100%; height: 320px; object-fit: cover; transition: 0.5s; }
        .anime-card:hover img { transform: scale(1.05); }
        .badge { position: absolute; top: 15px; left: 15px; background: #00d1ff; color: #000; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; z-index: 2; }
        .card-info { padding: 18px; background: linear-gradient(to top, #0d1117, transparent); }
        .card-info h3 { color: #fff; margin: 0; font-size: 1.2rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="location.href='index.html'">ANIME<span>YONIX</span></div>
            
            <div class="search-container">
                <input type="text" id="searchInput" onkeyup="searchAnime()" placeholder="Search your anime...">
                <i class="fas fa-search"></i>
            </div>

            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="#" class="login-btn">Login</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 130px;">
        <h2 style="color: #fff; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-bolt" style="color: #00d1ff;"></i> Trending Now
        </h2>
        
        <div class="anime-grid" id="animeGrid">
            <a href="player.html?anime=solo-leveling" class="anime-card" data-title="Solo Leveling">
                <div class="badge">EP 12</div>
                <img src="./solo.jpg" alt="Solo Leveling" onerror="this.src='https://via.placeholder.com/220x320?text=Solo+Leveling'">
                <div class="card-info">
                    <h3>Solo Leveling</h3>
                    <p style="color: #8b949e; margin-top: 5px;">Action • Fantasy</p>
                </div>
            </a>

            <a href="player.html?anime=dragon-ball" class="anime-card" data-title="Dragon Ball">
                <div class="badge">HOT</div>
                <img src="./db.jpg" alt="Dragon Ball" onerror="this.src='https://via.placeholder.com/220x320?text=Dragon+Ball'">
                <div class="card-info">
                    <h3>Dragon Ball DAIMA</h3>
                    <p style="color: #8b949e; margin-top: 5px;">Adventure • Shonen</p>
                </div>
            </a>
        </div>
    </div>

    <script>
        function searchAnime() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('anime-card');
            
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute('data-title').toLowerCase();
                if (title.includes(input)) {
                    cards[i].style.display = "block";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>

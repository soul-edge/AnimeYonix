<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AnimeYonix | Hunter x Hunter</title>
    <style>
        :root { --bg: #0b0e14; --blue: #00a2ff; --yellow: #ffcc00; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); padding-bottom: 15px; margin-bottom: 30px; }
        .logo { font-size: 28px; font-weight: bold; }
        .logo span { color: var(--yellow); }
        
        /* The Card */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .anime-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid transparent; cursor: pointer; transition: 0.3s; }
        .anime-card:hover { border-color: var(--yellow); transform: translateY(-5px); }
        .anime-card img { width: 100%; height: 280px; object-fit: cover; background: #222; }
        .anime-card p { padding: 12px; margin: 0; text-align: center; font-weight: bold; }

        /* Video Player (Now visible under the card) */
        .video-section { margin-top: 40px; border: 2px solid var(--blue); border-radius: 10px; overflow: hidden; background: black; }
        video { width: 100%; display: block; }
        .episode-bar { background: #1a1d24; padding: 15px; border-top: 1px solid #333; }
        .ep-btn { background: var(--yellow); color: black; border: none; padding: 8px 20px; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ANIME<span>YONIX</span></div>
        <button style="border: 1px solid var(--yellow); color: var(--yellow); background: none; padding: 5px 15px; border-radius: 5px;">LOGIN</button>
    </header>

    <div class="anime-grid">
        <div class="anime-card">
            <img src="7I7Z9TNbyNL.jpg" alt="HxH Poster">
            <p>Hunter x Hunter (2011) - Ep 01</p>
        </div>
    </div>

    <div class="video-section">
        <video id="mainVideo" controls crossorigin="anonymous">
            <source src="HxH.01.mp4" type="video/mp4">
            <source src="HxH.01.mp4" type="video/x-matroska"> 
            
            <track label="English" kind="subtitles" srclang="en" src="subs/hxh01.vtt" default>
        </video>
        <div class="episode-bar">
            <button class="ep-btn">Episode 1</button>
        </div>
    </div>

</body>
</html>

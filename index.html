<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episodes - AnimeYonix</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Pro Player Styling */
        .ep-header { margin-bottom: 30px; }
        .ep-header h1 { font-size: 2.5rem; color: #fff; margin-bottom: 10px; }
        .breadcrumb { color: var(--primary); font-size: 0.9rem; margin-bottom: 20px; }
        
        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .ep-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid #30363d;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s all ease;
        }

        .ep-link:hover, .ep-link.active {
            background: var(--primary);
            color: #000;
            transform: translateY(-3px);
            border-color: #fff;
        }

        /* Video Section Styling */
        .video-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 40px;
            display: none; /* Hidden until episode is clicked */
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        .no-anime {
            text-align: center;
            padding: 100px 0;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
                ANIME<span>YONIX</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="#" class="active">Trending</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <div id="contentArea">
            
            <div class="video-container" id="playerSection">
                <div class="video-wrapper">
                    <iframe id="mainPlayer" src="" allowfullscreen scrolling="no" sandbox="allow-forms allow-scripts allow-same-origin"></iframe>
                </div>
                <h2 id="nowPlayingTitle" style="margin-top: 20px; color: var(--primary); font-size: 1.5rem;"></h2>
            </div>

            <div class="breadcrumb">
                <a href="index.html" style="color: var(--primary); text-decoration: none;">Home</a> 
                <i class="fas fa-chevron-right" style="font-size: 0.7rem; margin: 0 10px;"></i> 
                <span id="b-name">Anime</span>
            </div>

            <div class="ep-header">
                <h1 id="mainTitle">Loading Anime...</h1>
                <p style="color: #8b949e;"><i class="fas fa-info-circle"></i> Select an episode to start watching.</p>
            </div>

            <div class="episode-grid" id="epGrid">
            </div>
        </div>

        <div id="errorArea" class="no-anime" style="display: none;">
            <i class="fas fa-search" style="font-size: 4rem; margin-bottom: 20px;"></i>
            <h1>Anime Not Found</h1>
            <p>We couldn't find the anime you're looking for. Return to the home page.</p>
            <a href="index.html" class="login-btn" style="display: inline-block; margin-top: 20px; text-decoration: none; color: black; background: var(--primary); padding: 10px 20px; border-radius: 5px;">Go Home</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const animeSlug = params.get('anime');
        const episodeNum = params.get('ep');

        const animeData = {
            'solo-leveling': {
                title: 'Solo Leveling',
                episodes: 12,
                links: {
                    // Cleaned up the link! Just the URL goes here, not the whole iframe tag.
                    '1': "https://animeyonix.seekplayer.me/e/tohl1"
                }
            },
            'dragon-ball': {
                title: 'Dragon Ball',
                episodes: 70,
                links: {}
            }
        };

        // Check if the anime exists in our data
        if (animeSlug && animeData[animeSlug]) {
            const data = animeData[animeSlug];
            document.getElementById('mainTitle').innerText = data.title;
            document.getElementById('b-name').innerText = data.title;

            // Show the player if an episode link exists
            if (episodeNum && data.links[episodeNum]) {
                document.getElementById('playerSection').style.display = 'block';
                document.getElementById('mainPlayer').src = data.links[episodeNum];
                document.getElementById('nowPlayingTitle').innerText = `Now Playing: Episode ${episodeNum}`;
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // Generate Episode Buttons
            let html = '';
            for (let i = 1; i <= data.episodes; i++) {
                const activeClass = (episodeNum == i) ? 'active' : '';
                html += `
                    <a href="player.html?anime=${animeSlug}&ep=${i}" class="ep-link ${activeClass}">
                        EP ${i < 10 ? '0' + i : i}
                    </a>
                `;
            }
            document.getElementById('epGrid').innerHTML = html;
        } else {
            // Show error if anime slug is invalid
            document.getElementById('contentArea').style.display = 'none';
            document.getElementById('errorArea').style.display = 'block';
        }
    </script>
</body>
</html>

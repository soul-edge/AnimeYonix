<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<meta name="referrer" content="no-referrer" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeYonix | Stream Premium Anime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">Anime<span>Yonix</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            
            <li id="nav-login"><a href="admin.html" style="color: #ff4757;">Login</a></li>
            <li id="nav-profile" style="display: none;"><a href="profile.html" style="color: #FFD700; font-weight: bold;">My List</a></li>
            <li id="nav-admin" style="display: none;"><a href="admin.html" style="color: white;">Dashboard</a></li>
            <li id="nav-logout" style="display: none;"><a href="#" onclick="logout()" style="color: gray;">Logout</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Welcome to AnimeYonix</h1>
            <p>Watch your favorite anime with multiple subtitles for free.</p>
        </div>
    </header>

    <div class="advanced-filter-container">
        
      <input type="text" id="userSearch" placeholder="Search anime..." onchange="searchAnimeAPI()">
        
        <div class="filter-dropdowns">
            <select id="filter-genre" onchange="applyFilters()">
                <option value="All">All Genres</option>
                </select>
            
            <select id="filter-type" onchange="applyFilters()">
                <option value="All">All Types</option>
                <option value="TV">TV Series</option>
                <option value="Movie">Movie</option>
                <option value="OVA">OVA / Special</option>
            </select>
            
            <select id="filter-status" onchange="applyFilters()">
                <option value="All">All Statuses</option>
                <option value="Ongoing">Ongoing</option>
                <option value="Completed">Completed</option>
            </select>
        </div>

        <div class="filter-letters" id="letterBox">
            </div>
        
    </div>

    <section>
        <h2 style="padding: 0 5%; margin-bottom: 20px;">Recent Additions</h2>
        <div id="episodeGrid" class="grid"></div>
    </section>

  <script src="script.js?v=3000"></script>
</body>
</html>

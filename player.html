<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeYonix</title>
    <link rel="stylesheet" href="./style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<div class="episode-list">
    <h2>Episodes</h2>
    <ul id="epList">
        </ul>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const anime = params.get('anime');
    const list = document.getElementById('epList');

    if (anime === 'solo-leveling') {
        document.getElementById('animeTitle').innerText = "Solo Leveling";
        
        // Using backticks (`) to create the clickable links
        list.innerHTML = `
            <li class="ep-item">
                <a href="watch.html?anime=solo-leveling&ep=1">Episode 1: I'm Used to It</a>
            </li>
            <li class="ep-item">
                <a href="watch.html?anime=solo-leveling&ep=2">Episode 2: If I Had One More Chance</a>
            </li>
        `;
    }
</script>

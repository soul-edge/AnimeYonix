<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watching - AnimeYonix</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="player-page">
    <nav class="navbar">
        <div class="logo">ANIME<span>YONIX</span></div>
    </nav>

    <div class="container">
        <h1 id="animeTitle">Loading...</h1>
        
        <div class="video-container">
            <div class="video-placeholder">Video Player Area</div>
        </div>

        <div class="episode-list">
            <h2>Episodes</h2>
            <ul id="epList">
                </ul>
        </div>
    </div>

    <script>
        // This script reads the URL (e.g., ?anime=solo-leveling)
        const params = new URLSearchParams(window.location.search);
        const anime = params.get('anime');
        
        if(anime === 'solo-leveling') {
            document.getElementById('animeTitle').innerText = "Solo Leveling";
            const list = document.getElementById('epList');
            // Add episodes manually for now
            list.innerHTML = `
                <li>Episode 1: I'm Used to It</li>
                <li>Episode 2: If I Had One More Chance</li>
                <li>Episode 3: It's Like a Game</li>
            `;
        }
    </script>
</body>
</html>

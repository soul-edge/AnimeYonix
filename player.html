<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch - AnimeYonix</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .episode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 30px; }
        .ep-link { display: flex; align-items: center; justify-content: center; background: #1a1d21; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 6px; text-decoration: none; font-weight: bold; transition: 0.2s; }
        .ep-link:hover, .ep-link.active { background: #00d1ff; color: #000; border-color: #fff; }
        .video-container { width: 100%; max-width: 1000px; margin: 0 auto 30px; display: none; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">ANIME<span>YONIX</span></div>
            <div class="nav-links"><a href="index.html">Home</a></div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <div id="contentArea">
            <div class="video-container" id="playerSection">
                <div class="video-wrapper">
                    <iframe id="mainPlayer" src="" allowfullscreen scrolling="no"></iframe>
                </div>
                <h2 id="nowPlayingTitle" style="margin-top: 15px; color: #00d1ff; font-size: 1.2rem;"></h2>
            </div>

            <h1 id="mainTitle" style="color: #fff; font-size: 2.5rem; margin-bottom: 10px;">Loading...</h1>
            <p style="color: #8b949e; margin-bottom: 20px;"><i class="fas fa-play-circle"></i> Select an episode below.</p>
            <div class="episode-grid" id="epGrid"></div>
        </div>

        <div id="errorArea" style="display: none; text-align: center; padding: 100px 0;">
            <i class="fas fa-exclamation-circle" style="font-size: 4rem; color: #30363d; margin-bottom: 20px;"></i>
            <h1 style="color: #fff;">Anime Not Found</h1>
            <p style="color: #8b949e;">We couldn't find that series. Please try again from the home page.</p>
            <a href="index.html" class="ep-link" style="display: inline-block; margin-top: 20px; width: 150px;">Go Home</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const animeSlug = params.get('anime');
        const episodeNum = params.get('ep');

        // DATABASE: Add your anime data here
        const animeData = {
            'solo-leveling': {
                title: 'Solo Leveling',
                episodes: 12,
                links: { 
                    '1': "https://animeyonix.seekplayer.me/e/5u8x6",
                    '2': "https://example.com/embed/ep2" 
                }
            },
            'dragon-ball': {
                title: 'Dragon Ball',
                episodes: 70,
                links: { '1': "https://example.com/embed/db1" }
            }
        };

        // EXECUTION LOGIC
        if (animeSlug && animeData[animeSlug]) {
            const data = animeData[animeSlug];
            document.getElementById('mainTitle').innerText = data.title;

            // Load Video if episode exists
            if (episodeNum && data.links[episodeNum]) {
                document.getElementById('playerSection').style.display = 'block';
                document.getElementById('mainPlayer').src = data.links[episodeNum];
                document.getElementById('nowPlayingTitle').innerText = `Now Playing: Episode ${episodeNum}`;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // Generate Episode Buttons
            let html = '';
            for (let i = 1; i <= data.episodes; i++) {
                const activeClass = (episodeNum == i) ? 'active' : '';
                html += `<a href="player.html?anime=${animeSlug}&ep=${i}" class="ep-link ${activeClass}">EP ${i}</a>`;
            }
            document.getElementById('epGrid').innerHTML = html;
        } else {
            // No anime found in URL? Show Error.
            document.getElementById('contentArea').style.display = 'none';
            document.getElementById('errorArea').style.display = 'block';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episodes - AnimeYonix</title>
    <link rel="stylesheet" href="./style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
            ANIME<span>YONIX</span>
        </div>
    </nav>

    <div class="container" style="margin-top: 120px;">
        <h1 id="animeTitle" style="color: var(--primary); margin-bottom: 20px;">Checking Database...</h1>

        <div class="episode-list">
            <h2 style="border-bottom: 1px solid #30363d; padding-bottom: 10px;">Episodes</h2>
            <ul id="epList" style="margin-top: 20px;">
                </ul>
        </div>
    </div>

    <script>
        // 1. Get the name from the URL (?anime=solo-leveling)
        const params = new URLSearchParams(window.location.search);
        const anime = params.get('anime');
        
        // 2. Find the places on the page to put text
        const titleElement = document.getElementById('animeTitle');
        const listElement = document.getElementById('epList');

        // 3. Logic: Check if the name matches
        if (anime === 'solo-leveling') {
            titleElement.innerText = "Solo Leveling";
            listElement.innerHTML = `
                <li class="ep-item">
                    <a href="watch.html?anime=solo-leveling&ep=1">Episode 01: I'm Used to It</a>
                </li>
                <li class="ep-item">
                    <a href="watch.html?anime=solo-leveling&ep=2">Episode 02: If I Had One More Chance</a>
                </li>
            `;
        } else {
            // This helps you debug if the name is wrong!
            titleElement.innerText = "Anime Not Found";
            listElement.innerHTML = `<li style="color: grey;">Check the URL parameter or index.html link.</li>`;
        }
    </script>
</body>
</html>

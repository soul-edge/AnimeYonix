<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episodes - AnimeYonix</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Specific styles for the episode list to make it look "Pro" */
        .ep-header { margin-bottom: 30px; }
        .ep-header h1 { font-size: 2.5rem; color: #fff; margin-bottom: 10px; }
        .breadcrumb { color: var(--primary); font-size: 0.9rem; margin-bottom: 20px; }
        
        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .ep-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid #30363d;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s all ease;
        }

        .ep-link:hover {
            background: var(--primary);
            color: #000;
            transform: translateY(-3px);
            border-color: #fff;
        }

        .no-anime {
            text-align: center;
            padding: 100px 0;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
                ANIME<span>YONIX</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="#" class="active">Trending</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <div id="contentArea">
            <div class="breadcrumb">
                <a href="index.html" style="color: var(--primary); text-decoration: none;">Home</a> 
                <i class="fas fa-chevron-right" style="font-size: 0.7rem; margin: 0 10px;"></i> 
                <span id="b-name">Anime</span>
            </div>

            <div class="ep-header">
                <h1 id="mainTitle">Loading Anime...</h1>
                <p style="color: #8b949e;"><i class="fas fa-info-circle"></i> Select an episode to start watching.</p>
            </div>

            <div class="episode-grid" id="epGrid">
                </div>
        </div>

        <div id="errorArea" class="no-anime" style="display: none;">
            <i class="fas fa-search" style="font-size: 4rem; margin-bottom: 20px;"></i>
            <h1>Anime Not Found</h1>
            <p>We couldn't find the anime you're looking for. Return to the home page.</p>
            <a href="index.html" class="login-btn" style="display: inline-block; margin-top: 20px; text-decoration: none; color: black;">Go Home</a>
        </div>
    </div>

    <script>
        // Grab the info from the URL
        const params = new URLSearchParams(window.location.search);
        const animeSlug = params.get('anime');

        // Target elements
        const mainTitle = document.getElementById('mainTitle');
        const bName = document.getElementById('b-name');
        const epGrid = document.getElementById('epGrid');
        const contentArea = document.getElementById('contentArea');
        const errorArea = document.getElementById('errorArea');

        // DATA: This is where you add your anime episodes
        const animeData = {
            'solo-leveling': {
                title: 'Solo Leveling',
                episodes: 12 // How many episodes to show
            },
            'lies-of-p': {
                title: 'Lies of P (Cinematics)',
                episodes: 3
            }
        };

        if (animeData[animeSlug]) {
            const data = animeData[animeSlug];
            mainTitle.innerText = data.title;
            bName.innerText = data.title;

            // Generate Episode Buttons Automatically
            let html = '';
            for (let i = 1; i <= data.episodes; i++) {
                html += `
                    <a href="watch.html?anime=${animeSlug}&ep=${i}" class="ep-link">
                        EP ${i < 10 ? '0' + i : i}
                    </a>
                `;
            }
            epGrid.innerHTML = html;
        } else {
            // Show error if anime doesn't exist in our data
            contentArea.style.display = 'none';
            errorArea.style.display = 'block';
        }
    </script>
</body>
</html>
